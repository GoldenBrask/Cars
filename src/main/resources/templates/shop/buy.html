<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buy a Car - Cars Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="bg-light min-vh-100 d-flex flex-column">

<nav class="navbar bg-white shadow-sm">
    <div class="container-xl">
        <a th:href="@{/}" class="navbar-brand fw-bold text-primary">Cars Manager</a>
        <div class="d-flex align-items-center gap-2">
            <a th:href="@{/shop}" class="nav-link text-secondary">Catalog</a>
            <form th:action="@{/logout}" method="post" class="d-inline">
                <button type="submit" class="btn btn-outline-secondary btn-sm">Logout</button>
            </form>
        </div>
    </div>
</nav>

<main class="container-xl flex-grow-1 py-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h1 class="h4 fw-bold mb-0">Buy a Car</h1>
        <a th:href="@{/shop}" class="btn btn-secondary">&larr; Back</a>
    </div>

    <div class="row g-3">
        <div class="col-md-4">
            <div class="card shadow-sm h-100">
                <div class="card-body">
                    <h5 class="card-title" th:text="${car.brand} + ' ' + ${car.model}">Car</h5>
                    <span class="badge-type mb-3 d-inline-block" th:text="${car.type}"
                          th:classappend="'badge-' + ${car.type.toString().toLowerCase()}"></span>
                    <ul class="list-group list-group-flush mt-2">
                        <li class="list-group-item d-flex justify-content-between px-0">
                            <span class="text-muted">Purchase Date</span>
                            <strong th:text="${#temporals.format(car.purchaseDate, 'dd/MM/yyyy')}"></strong>
                        </li>
                        <li class="list-group-item d-flex justify-content-between px-0">
                            <span class="text-muted">Max Passengers</span>
                            <strong th:text="${car.maxPassengers}"></strong>
                        </li>
                        <li class="list-group-item d-flex justify-content-between px-0">
                            <span class="text-muted">Max Speed</span>
                            <strong th:text="${car.maxSpeed} + ' km/h'"></strong>
                        </li>
                        <li class="list-group-item d-flex justify-content-between px-0">
                            <span class="text-muted">Air Conditioner</span>
                            <strong th:text="${car.airConditioner ? 'Yes' : 'No'}"></strong>
                        </li>
                        <li class="list-group-item d-flex justify-content-between px-0">
                            <span class="text-muted">Transmission</span>
                            <strong th:text="${car.automaticTransmission ? 'Automatic' : 'Manual'}"></strong>
                        </li>
                        <li class="list-group-item d-flex justify-content-between px-0">
                            <span class="text-muted">Sale Price</span>
                            <strong class="text-primary"
                                    th:text="'$' + ${#numbers.formatDecimal(car.carPrice, 1, 'COMMA', 2, 'POINT')}"></strong>
                        </li>
                    </ul>
                </div>
            </div>
        </div>

        <div class="col-md-8">
            <div class="card shadow-sm">
                <div class="card-body">
                    <h5 class="card-title mb-3">Purchase Confirmation</h5>
                    <form th:action="@{/shop/buy/{id}(id=${car.id})}" method="post">
                        <div class="alert alert-success text-center">
                            <p class="mb-1">You are about to purchase:</p>
                            <p class="fw-bold fs-5 mb-1" th:text="${car.brand} + ' ' + ${car.model}"></p>
                            <p class="fw-bold fs-4 mb-0 text-success"
                               th:text="'Total: $' + ${#numbers.formatDecimal(car.carPrice, 1, 'COMMA', 2, 'POINT')}"></p>
                        </div>
                        <div class="d-flex gap-2 pt-3 border-top">
                            <button type="submit" class="btn btn-success">Confirm Purchase</button>
                            <a th:href="@{/shop}" class="btn btn-secondary">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</main>

<footer class="text-center py-3 text-muted border-top bg-white mt-4">
    <small>Cars Manager &copy; 2026</small>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
