<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop - Cars Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="bg-light min-vh-100 d-flex flex-column">

<nav class="navbar bg-white shadow-sm">
    <div class="container-xl">
        <a th:href="@{/}" class="navbar-brand fw-bold text-primary">Cars Manager</a>
        <div class="d-flex align-items-center gap-2">
            <a th:href="@{/shop}" class="nav-link text-secondary">Catalog</a>
            <form th:action="@{/logout}" method="post" class="d-inline">
                <button type="submit" class="btn btn-outline-secondary btn-sm">Logout</button>
            </form>
        </div>
    </div>
</nav>

<main class="container-xl flex-grow-1 py-4">
    <div th:if="${successMessage}" class="alert alert-success alert-dismissible">
        <span th:text="${successMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible">
        <span th:text="${errorMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="d-flex justify-content-between align-items-center mb-3">
        <div>
            <h1 class="h4 fw-bold mb-0">Car Catalog</h1>
            <small class="text-muted" th:text="${cars.size()} + ' car(s) available'"></small>
        </div>
    </div>

    <form th:action="@{/shop}" method="get" class="d-flex gap-2 mb-4">
        <input type="text" name="search" class="form-control" style="max-width:320px"
               placeholder="Search by brand..." th:value="${search}">
        <button type="submit" class="btn btn-secondary">Search</button>
        <a th:href="@{/shop}" class="btn btn-outline-secondary"
           th:if="${search != null and !search.isEmpty()}">Clear</a>
    </form>

    <div th:if="${cars.isEmpty()}" class="text-center py-5 text-muted">
        <p class="mt-2">No cars available at the moment.</p>
    </div>

    <div class="row g-3">
        <div class="col-md-4 col-sm-6" th:each="car : ${cars}">
            <div class="card h-100 shadow-sm">
                <div class="card-header bg-light">
                    <span class="badge-type" th:text="${car.type}"
                          th:classappend="'badge-' + ${car.type.toString().toLowerCase()}"></span>
                </div>
                <div class="card-body">
                    <h5 class="card-title" th:text="${car.brand} + ' ' + ${car.model}">Brand Model</h5>
                    <p class="text-muted small mb-2">
                        <span th:text="${car.maxPassengers} + ' passengers'"></span>
                        &nbsp;|&nbsp;
                        <span th:text="${car.maxSpeed} + ' km/h'"></span>
                        <span th:if="${car.airConditioner}">&nbsp;| A/C</span>
                        <span th:if="${car.automaticTransmission}">&nbsp;| Auto</span>
                    </p>
                    <div class="row g-2 mb-2">
                        <div class="col-6">
                            <div class="bg-light rounded p-2 text-center">
                                <div class="text-muted" style="font-size:.7rem; font-weight:700; text-transform:uppercase;">Rental / Day</div>
                                <div class="fw-bold text-primary"
                                     th:text="'$' + ${#numbers.formatDecimal(car.rentalPricePerDay, 1, 'COMMA', 2, 'POINT')}"></div>
                            </div>
                        </div>
                        <div class="col-6">
                            <div class="bg-light rounded p-2 text-center">
                                <div class="text-muted" style="font-size:.7rem; font-weight:700; text-transform:uppercase;">Buy Price</div>
                                <div class="fw-bold text-primary"
                                     th:text="'$' + ${#numbers.formatDecimal(car.carPrice, 1, 'COMMA', 2, 'POINT')}"></div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="card-footer d-flex gap-2 bg-white">
                    <a th:href="@{/shop/rent/{id}(id=${car.id})}" class="btn btn-primary btn-sm flex-fill">Rent</a>
                    <a th:href="@{/shop/buy/{id}(id=${car.id})}" class="btn btn-success btn-sm flex-fill">Buy</a>
                </div>
            </div>
        </div>
    </div>
</main>

<footer class="text-center py-3 text-muted border-top bg-white mt-4">
    <small>Cars Manager &copy; 2026</small>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
