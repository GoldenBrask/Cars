<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Louer un véhicule - Cars Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="bg-light min-vh-100 d-flex flex-column">

<nav class="navbar bg-white shadow-sm">
    <div class="container-xl">
        <a th:href="@{/}" class="navbar-brand fw-bold text-primary">Cars Manager</a>
        <div class="d-flex align-items-center gap-2">
            <a th:href="@{/shop}" class="nav-link text-secondary">Catalogue</a>
            <form th:action="@{/logout}" method="post" class="d-inline">
                <button type="submit" class="btn btn-outline-secondary btn-sm">Déconnexion</button>
            </form>
        </div>
    </div>
</nav>

<main class="container-xl flex-grow-1 py-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h1 class="h4 fw-bold mb-0">Louer un véhicule</h1>
        <a th:href="@{/shop}" class="btn btn-secondary">&larr; Retour</a>
    </div>

    <div class="row g-3">
        <!-- Fiche véhicule -->
        <div class="col-md-4">
            <div class="card shadow-sm h-100">
                <div class="card-body">
                    <h5 class="card-title" th:text="${car.brand} + ' ' + ${car.model}">Véhicule</h5>
                    <span class="badge-type mb-3 d-inline-block" th:text="${car.type}"
                          th:classappend="'badge-' + ${car.type.toString().toLowerCase()}"></span>
                    <ul class="list-group list-group-flush mt-2">
                        <li class="list-group-item d-flex justify-content-between px-0">
                            <span class="text-muted">Passagers max</span>
                            <strong th:text="${car.maxPassengers}"></strong>
                        </li>
                        <li class="list-group-item d-flex justify-content-between px-0">
                            <span class="text-muted">Vitesse max</span>
                            <strong th:text="${car.maxSpeed} + ' km/h'"></strong>
                        </li>
                        <li class="list-group-item d-flex justify-content-between px-0">
                            <span class="text-muted">Climatisation</span>
                            <strong th:text="${car.airConditioner ? 'Oui' : 'Non'}"></strong>
                        </li>
                        <li class="list-group-item d-flex justify-content-between px-0">
                            <span class="text-muted">Transmission</span>
                            <strong th:text="${car.automaticTransmission ? 'Automatique' : 'Manuelle'}"></strong>
                        </li>
                        <li class="list-group-item d-flex justify-content-between px-0">
                            <span class="text-muted">Prix / jour</span>
                            <strong class="text-primary"
                                    th:text="'$' + ${#numbers.formatDecimal(car.rentalPricePerDay, 1, 'COMMA', 2, 'POINT')}"></strong>
                        </li>
                    </ul>
                </div>
            </div>
        </div>

        <!-- Formulaire de location -->
        <div class="col-md-8">
            <div class="card shadow-sm">
                <div class="card-body">
                    <h5 class="card-title mb-3">Détails de la location</h5>

                    <form th:action="@{/shop/rent/{id}(id=${car.id})}" method="post" id="rentForm">
                        <div class="row g-3 mb-3">
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Date de début *</label>
                                <input type="date" id="startDate" name="startDate" class="form-control" required
                                       th:attr="min=${#temporals.format(#temporals.createNow(), 'yyyy-MM-dd')}">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Date de fin *</label>
                                <input type="date" id="endDate" name="endDate" class="form-control" required
                                       th:attr="min=${#temporals.format(#temporals.createNow(), 'yyyy-MM-dd')}">
                            </div>
                        </div>

                        <!-- Résumé du prix (caché par défaut) -->
                        <div id="priceSummary" class="alert alert-primary d-none mb-3">
                            <div class="d-flex justify-content-between align-items-center">
                                <span>Durée : <strong id="nbJours">0</strong> jour(s)</span>
                                <span class="fs-5 fw-bold">Total : <span id="prixTotal">0</span> $</span>
                            </div>
                        </div>

                        <!-- Alerte chevauchement -->
                        <div id="alerteChevauchement" class="alert alert-danger d-none mb-3">
                            <strong>&#9888; Ce véhicule est déjà réservé sur cette période.</strong>
                            <div id="periodesOccupees" class="mt-1 small"></div>
                        </div>

                        <div class="d-flex gap-2 pt-3 border-top mt-2">
                            <button type="submit" id="btnLouer" class="btn btn-primary">Confirmer la location</button>
                            <a th:href="@{/shop}" class="btn btn-secondary">Annuler</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</main>

<footer class="text-center py-3 text-muted border-top bg-white mt-4">
    <small>Cars Manager &copy; 2026</small>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script th:inline="javascript">
    // Périodes déjà réservées injectées depuis le serveur
    const periodesReservees = /*[[${periodesReservees}]]*/ '[]';
    const reservations = JSON.parse(periodesReservees);

    const prixParJour = /*[[${car.rentalPricePerDay}]]*/ 0;

    const inputStart   = document.getElementById('startDate');
    const inputEnd     = document.getElementById('endDate');
    const priceSummary = document.getElementById('priceSummary');
    const alerteChev   = document.getElementById('alerteChevauchement');
    const periodesDiv  = document.getElementById('periodesOccupees');
    const nbJoursEl    = document.getElementById('nbJours');
    const prixTotalEl  = document.getElementById('prixTotal');
    const btnLouer     = document.getElementById('btnLouer');

    function formatDate(str) {
        const [y, m, d] = str.split('-');
        return d + '/' + m + '/' + y;
    }

    function chevauchement(start, end) {
        // Retourne les réservations qui chevauchent la période choisie
        return reservations.filter(r => {
            const rStart = new Date(r.start);
            const rEnd   = new Date(r.end);
            return start < rEnd && end > rStart;
        });
    }

    function majAffichage() {
        const startVal = inputStart.value;
        const endVal   = inputEnd.value;

        if (!startVal || !endVal) {
            priceSummary.classList.add('d-none');
            alerteChev.classList.add('d-none');
            btnLouer.disabled = false;
            return;
        }

        const start = new Date(startVal);
        const end   = new Date(endVal);

        if (end <= start) {
            priceSummary.classList.add('d-none');
            alerteChev.classList.add('d-none');
            btnLouer.disabled = false;
            return;
        }

        // Calcul du nombre de jours et du prix
        const diffMs   = end - start;
        const nbJours  = Math.round(diffMs / (1000 * 60 * 60 * 24));
        const total    = (prixParJour * nbJours).toFixed(2);

        nbJoursEl.textContent  = nbJours;
        prixTotalEl.textContent = total;
        priceSummary.classList.remove('d-none');

        // Vérification des chevauchements
        const conflits = chevauchement(start, end);
        if (conflits.length > 0) {
            let html = 'Périodes déjà réservées :';
            html += '<ul class="mb-0 mt-1">';
            conflits.forEach(r => {
                html += '<li>' + formatDate(r.start) + ' → ' + formatDate(r.end) + '</li>';
            });
            html += '</ul>';
            periodesDiv.innerHTML = html;
            alerteChev.classList.remove('d-none');
            btnLouer.disabled = true;
        } else {
            alerteChev.classList.add('d-none');
            btnLouer.disabled = false;
        }
    }

    // Synchroniser le min de la date de fin avec la date de début choisie
    inputStart.addEventListener('change', function () {
        if (this.value) {
            inputEnd.min = this.value;
            if (inputEnd.value && inputEnd.value <= this.value) {
                inputEnd.value = '';
            }
        }
        majAffichage();
    });

    inputEnd.addEventListener('change', majAffichage);
</script>

</body>
</html>
