<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Cars Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="bg-light min-vh-100 d-flex flex-column">

<nav class="navbar bg-white shadow-sm">
    <div class="container-xl">
        <a th:href="@{/}" class="navbar-brand fw-bold text-primary">Cars Manager</a>
    </div>
</nav>

<main class="flex-grow-1 d-flex align-items-center justify-content-center">
    <div class="card shadow-sm" style="min-width:350px;">
        <div class="card-body p-4">
            <h4 class="fw-bold mb-4">Login</h4>

            <div th:if="${param.logout}" class="alert alert-info">You have been logged out.</div>
            <div th:if="${param.registered}" class="alert alert-success">Account created. You can now log in.</div>
            <div th:if="${param.error}" class="alert alert-danger">Invalid username or password.</div>

            <form th:action="@{/login}" method="post">
                <div class="mb-3">
                    <label class="form-label fw-semibold">Username</label>
                    <input type="text" name="username" class="form-control" required autofocus>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold">Password</label>
                    <input type="password" name="password" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-primary w-100">Login</button>
            </form>

            <div class="text-center mt-3">
                <a th:href="@{/register}" class="text-secondary small">Create an account</a>
            </div>
        </div>
    </div>
</main>

<footer class="text-center py-3 text-muted border-top bg-white">
    <small>Cars Manager &copy; 2026</small>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
