<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle} + ' - Cars Manager'">Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="bg-light min-vh-100 d-flex flex-column">

<nav class="navbar bg-white shadow-sm">
    <div class="container-xl">
        <a th:href="@{/}" class="navbar-brand fw-bold text-primary">Cars Manager</a>
        <div class="d-flex align-items-center gap-2">
            <span class="badge text-white" style="background:#7c3aed">ADMIN</span>
            <a th:href="@{/cars}" class="nav-link text-secondary">Fleet</a>
            <form th:action="@{/logout}" method="post" class="d-inline">
                <button type="submit" class="btn btn-outline-secondary btn-sm">Logout</button>
            </form>
        </div>
    </div>
</nav>

<main class="container-xl flex-grow-1 py-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h1 class="h4 fw-bold mb-0" th:text="${pageTitle}">Form</h1>
        <a th:href="@{/cars}" class="btn btn-secondary">&larr; Back</a>
    </div>

    <div class="card shadow-sm">
        <div class="card-body">
            <form th:action="${car.id == null ? '/cars' : '/cars/edit/' + car.id}"
                  method="post" th:object="${car}">

                <p class="text-uppercase text-muted fw-bold small border-bottom pb-1 mt-2">Vehicle Identity</p>
                <div class="row g-3 mb-2">
                    <div class="col-md-4">
                        <label class="form-label fw-semibold">Type *</label>
                        <select class="form-select" th:field="*{type}"
                                th:classappend="${#fields.hasErrors('type')} ? ' is-invalid'">
                            <option value="">-- Select type --</option>
                            <option th:each="t : ${carTypes}" th:value="${t}" th:text="${t}"></option>
                        </select>
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('type')}" th:errors="*{type}"></div>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label fw-semibold">Brand *</label>
                        <input type="text" class="form-control" th:field="*{brand}" placeholder="e.g. Toyota"
                               th:classappend="${#fields.hasErrors('brand')} ? ' is-invalid'">
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('brand')}" th:errors="*{brand}"></div>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label fw-semibold">Model *</label>
                        <input type="text" class="form-control" th:field="*{model}" placeholder="e.g. Corolla"
                               th:classappend="${#fields.hasErrors('model')} ? ' is-invalid'">
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('model')}" th:errors="*{model}"></div>
                    </div>
                </div>

                <div class="row g-3 mb-2">
                    <div class="col-md-4">
                        <label class="form-label fw-semibold">Purchase Date *</label>
                        <input type="date" class="form-control" th:field="*{purchaseDate}"
                               th:classappend="${#fields.hasErrors('purchaseDate')} ? ' is-invalid'">
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('purchaseDate')}" th:errors="*{purchaseDate}"></div>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label fw-semibold">Max Passengers *</label>
                        <input type="number" class="form-control" th:field="*{maxPassengers}" placeholder="5" min="1" max="20"
                               th:classappend="${#fields.hasErrors('maxPassengers')} ? ' is-invalid'">
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('maxPassengers')}" th:errors="*{maxPassengers}"></div>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label fw-semibold">Max Speed (km/h) *</label>
                        <input type="number" class="form-control" th:field="*{maxSpeed}" placeholder="200" min="1"
                               th:classappend="${#fields.hasErrors('maxSpeed')} ? ' is-invalid'">
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('maxSpeed')}" th:errors="*{maxSpeed}"></div>
                    </div>
                </div>

                <p class="text-uppercase text-muted fw-bold small border-bottom pb-1 mt-3">Pricing</p>
                <div class="row g-3 mb-2">
                    <div class="col-md-6">
                        <label class="form-label fw-semibold">Car Price ($) *</label>
                        <input type="number" class="form-control" th:field="*{carPrice}" placeholder="25000" step="0.01" min="0.01"
                               th:classappend="${#fields.hasErrors('carPrice')} ? ' is-invalid'">
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('carPrice')}" th:errors="*{carPrice}"></div>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-semibold">Rental Price / Day ($) *</label>
                        <input type="number" class="form-control" th:field="*{rentalPricePerDay}" placeholder="80" step="0.01" min="0.01"
                               th:classappend="${#fields.hasErrors('rentalPricePerDay')} ? ' is-invalid'">
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('rentalPricePerDay')}" th:errors="*{rentalPricePerDay}"></div>
                    </div>
                </div>

                <p class="text-uppercase text-muted fw-bold small border-bottom pb-1 mt-3">Options</p>
                <div class="d-flex gap-3 flex-wrap mb-3">
                    <div class="card p-3">
                        <div class="form-check mb-0">
                            <input class="form-check-input" type="checkbox" th:field="*{airConditioner}">
                            <label class="form-check-label fw-semibold">Air Conditioner</label>
                        </div>
                    </div>
                    <div class="card p-3">
                        <div class="form-check mb-0">
                            <input class="form-check-input" type="checkbox" th:field="*{automaticTransmission}">
                            <label class="form-check-label fw-semibold">Automatic Transmission</label>
                        </div>
                    </div>
                </div>

                <div class="d-flex gap-2 pt-3 border-top">
                    <button type="submit" class="btn btn-primary"
                            th:text="${car.id == null ? 'Save Car' : 'Update Car'}">Save</button>
                    <a th:href="@{/cars}" class="btn btn-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</main>

<footer class="text-center py-3 text-muted border-top bg-white mt-4">
    <small>Cars Manager &copy; 2026</small>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
