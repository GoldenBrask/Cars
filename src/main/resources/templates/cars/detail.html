<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${car.brand} + ' ' + ${car.model} + ' - Cars Manager'">Car Detail</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="bg-light min-vh-100 d-flex flex-column">

<nav class="navbar bg-white shadow-sm">
    <div class="container-xl">
        <a th:href="@{/}" class="navbar-brand fw-bold text-primary">Cars Manager</a>
        <div class="d-flex align-items-center gap-2">
            <span class="badge text-white" style="background:#7c3aed">ADMIN</span>
            <a th:href="@{/cars}" class="nav-link text-secondary">Fleet</a>
            <form th:action="@{/logout}" method="post" class="d-inline">
                <button type="submit" class="btn btn-outline-secondary btn-sm">Logout</button>
            </form>
        </div>
    </div>
</nav>

<main class="container-xl flex-grow-1 py-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h1 class="h4 fw-bold mb-0" th:text="${car.brand} + ' ' + ${car.model}">Car</h1>
        <a th:href="@{/cars}" class="btn btn-secondary">&larr; Back</a>
    </div>

    <div class="card shadow-sm">
        <div class="card-body">
            <div class="row g-3 mb-3">
                <div class="col-md-6 col-lg-4">
                    <p class="text-uppercase text-muted small fw-bold mb-1">Type</p>
                    <span class="badge-type" th:text="${car.type}"
                          th:classappend="'badge-' + ${car.type.toString().toLowerCase()}"></span>
                </div>
                <div class="col-md-6 col-lg-4">
                    <p class="text-uppercase text-muted small fw-bold mb-1">Brand</p>
                    <span th:text="${car.brand}">-</span>
                </div>
                <div class="col-md-6 col-lg-4">
                    <p class="text-uppercase text-muted small fw-bold mb-1">Model</p>
                    <span th:text="${car.model}">-</span>
                </div>
                <div class="col-md-6 col-lg-4">
                    <p class="text-uppercase text-muted small fw-bold mb-1">Purchase Date</p>
                    <span th:text="${#temporals.format(car.purchaseDate, 'dd/MM/yyyy')}">-</span>
                </div>
                <div class="col-md-6 col-lg-4">
                    <p class="text-uppercase text-muted small fw-bold mb-1">Car Price</p>
                    <span class="fw-bold text-primary fs-5"
                          th:text="'$' + ${#numbers.formatDecimal(car.carPrice, 1, 'COMMA', 2, 'POINT')}">-</span>
                </div>
                <div class="col-md-6 col-lg-4">
                    <p class="text-uppercase text-muted small fw-bold mb-1">Rental / Day</p>
                    <span class="fw-bold text-primary fs-5"
                          th:text="'$' + ${#numbers.formatDecimal(car.rentalPricePerDay, 1, 'COMMA', 2, 'POINT')}">-</span>
                </div>
                <div class="col-md-6 col-lg-4">
                    <p class="text-uppercase text-muted small fw-bold mb-1">Max Passengers</p>
                    <span th:text="${car.maxPassengers}">-</span>
                </div>
                <div class="col-md-6 col-lg-4">
                    <p class="text-uppercase text-muted small fw-bold mb-1">Max Speed</p>
                    <span th:text="${car.maxSpeed} + ' km/h'">-</span>
                </div>
                <div class="col-md-6 col-lg-4">
                    <p class="text-uppercase text-muted small fw-bold mb-1">Air Conditioner</p>
                    <span th:if="${car.airConditioner}" class="icon-yes">Yes</span>
                    <span th:unless="${car.airConditioner}" class="icon-no">No</span>
                </div>
                <div class="col-md-6 col-lg-4">
                    <p class="text-uppercase text-muted small fw-bold mb-1">Transmission</p>
                    <span th:if="${car.automaticTransmission}" class="icon-yes">Automatic</span>
                    <span th:unless="${car.automaticTransmission}" class="icon-no">Manual</span>
                </div>
            </div>

            <div class="d-flex gap-2 pt-3 border-top">
                <a th:href="@{/cars/edit/{id}(id=${car.id})}" class="btn btn-warning">Edit</a>
                <form th:action="@{/cars/delete/{id}(id=${car.id})}" method="post" class="d-inline"
                      onsubmit="return confirm('Delete this car?')">
                    <button type="submit" class="btn btn-danger">Delete</button>
                </form>
            </div>
        </div>
    </div>
</main>

<footer class="text-center py-3 text-muted border-top bg-white mt-4">
    <small>Cars Manager &copy; 2026</small>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
