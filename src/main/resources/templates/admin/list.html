<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Car Fleet</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="bg-light min-vh-100 d-flex flex-column">

<nav class="navbar bg-white shadow-sm">
    <div class="container-xl">
        <a th:href="@{/}" class="navbar-brand fw-bold text-primary">Cars Manager</a>
        <div class="d-flex align-items-center gap-2">
            <span class="badge text-white" style="background:#7c3aed">ADMIN</span>
            <a th:href="@{/admin/cars}" class="nav-link text-secondary">Fleet</a>
            <form th:action="@{/logout}" method="post" class="d-inline">
                <button type="submit" class="btn btn-outline-secondary btn-sm">Logout</button>
            </form>
        </div>
    </div>
</nav>

<main class="container-xl flex-grow-1 py-4">
    <div th:if="${successMessage}" class="alert alert-success alert-dismissible">
        <span th:text="${successMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible">
        <span th:text="${errorMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="d-flex justify-content-between align-items-center mb-3">
        <div>
            <h1 class="h4 fw-bold mb-0">Car Fleet Management</h1>
            <small class="text-muted" th:text="${cars.size()} + ' car(s) in fleet'"></small>
        </div>
        <a th:href="@{/admin/cars/new}" class="btn btn-primary">+ Add Car</a>
    </div>

    <div class="card shadow-sm">
        <div class="table-responsive">
            <table class="table table-hover table-sm mb-0" th:if="${!cars.isEmpty()}">
                <thead class="table-light">
                    <tr>
                        <th>#</th>
                        <th>Type</th>
                        <th>Brand</th>
                        <th>Model</th>
                        <th>Purchase Date</th>
                        <th>Car Price</th>
                        <th>Rental/Day</th>
                        <th>Pass.</th>
                        <th>Speed</th>
                        <th>A/C</th>
                        <th>Auto</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="car : ${cars}">
                        <td th:text="${car.id}"></td>
                        <td><span class="badge-type" th:text="${car.type}" th:classappend="'badge-' + ${car.type.toString().toLowerCase()}"></span></td>
                        <td th:text="${car.brand}"></td>
                        <td th:text="${car.model}"></td>
                        <td th:text="${#temporals.format(car.purchaseDate, 'dd/MM/yyyy')}"></td>
                        <td th:text="'$' + ${#numbers.formatDecimal(car.carPrice, 1, 'COMMA', 2, 'POINT')}"></td>
                        <td th:text="'$' + ${#numbers.formatDecimal(car.rentalPricePerDay, 1, 'COMMA', 2, 'POINT')}"></td>
                        <td class="text-center" th:text="${car.maxPassengers}"></td>
                        <td class="text-center" th:text="${car.maxSpeed} + ' km/h'"></td>
                        <td class="text-center">
                            <span th:if="${car.airConditioner}" class="icon-yes">Yes</span>
                            <span th:unless="${car.airConditioner}" class="icon-no">No</span>
                        </td>
                        <td class="text-center">
                            <span th:if="${car.automaticTransmission}" class="icon-yes">Yes</span>
                            <span th:unless="${car.automaticTransmission}" class="icon-no">No</span>
                        </td>
                        <td>
                            <a th:href="@{/admin/cars/edit/{id}(id=${car.id})}" class="btn btn-sm btn-warning">Edit</a>
                            <form th:action="@{/admin/cars/delete/{id}(id=${car.id})}" method="post" class="d-inline"
                                  onsubmit="return confirm('Delete this car?')">
                                <button type="submit" class="btn btn-sm btn-danger">Delete</button>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
        <div th:if="${cars.isEmpty()}" class="text-center py-5 text-muted">
            <p class="mt-2">No cars in the fleet yet.</p>
            <a th:href="@{/admin/cars/new}" class="btn btn-primary">Add the first car</a>
        </div>
    </div>
</main>

<footer class="text-center py-3 text-muted border-top bg-white mt-4">
    <small>Cars Manager &copy; 2026</small>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
