<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cars Manager</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<header>
    <nav>
        <a th:href="@{/}" class="brand">&#128663; Cars Manager</a>
    </nav>
</header>
<main>
    <div class="home-hero">
        <h1>Welcome to Cars Manager</h1>
        <p>Choose your access mode</p>
        <div class="home-cards">
            <a th:href="@{/shop}" class="home-card home-card-user">
                <div class="home-card-icon">&#128100;</div>
                <h2>Customer</h2>
                <p>Browse cars, rent or buy</p>
            </a>
            <a th:href="@{/admin/cars}" class="home-card home-card-admin">
                <div class="home-card-icon">&#9881;</div>
                <h2>Admin</h2>
                <p>Manage the car fleet</p>
            </a>
        </div>
    </div>
</main>
<footer><p>Cars Manager &copy; 2026</p></footer>
</body>
</html>
